name: post song reel

on:
  schedule:
    # 07:00 UTC = 5pm Sydney (AEST). github cron ignores DST, so in Sydney
    # summer (AEDT) this fires at 6pm - still inside the machine's on-hours.
    - cron: "0 7 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  post:
    # self-hosted so downloads run from a residential IP. youtube serves
    # github's datacenter IPs SABR/po-token-gated formats that fail every
    # spotdl download ("Requested format is not available") - a residential
    # IP is not gated and needs no cookies. requires a machine with python,
    # ffmpeg, and cairo on PATH (see README) running the actions runner.
    runs-on: [self-hosted]
    steps:
      - uses: actions/checkout@v4

      - name: install dependencies
        # keep yt-dlp current: youtube rotates its player constantly and a
        # stale yt-dlp fails downloads with "Requested format is not available".
        run: |
          python -m pip install -r requirements.txt pynacl
          python -m pip install --upgrade yt-dlp

      - name: refresh instagram token
        env:
          INSTAGRAM_ACCOUNT_TOKEN: ${{ secrets.INSTAGRAM_ACCOUNT_TOKEN }}
          GH_PAT:                  ${{ secrets.GH_PAT }}
        run: python scripts/refresh_ig_token.py

      - name: post song
        env:
          SPOTIFY_CLIENT_ID:       ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET:   ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN:   ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
          INSTAGRAM_ACCOUNT_TOKEN: ${{ secrets.INSTAGRAM_ACCOUNT_TOKEN }}
          INSTAGRAM_USER_ID:       ${{ secrets.INSTAGRAM_USER_ID }}
          GH_TOKEN:                ${{ github.token }}
        run: python main.py -v
