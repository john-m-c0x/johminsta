name: post song reel

on:
  schedule:
    - cron: "17 15 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg libcairo2 libpango-1.0-0

      - name: install dependencies
        # upgrade yt-dlp past whatever spotdl pins: youtube rotates its player
        # constantly and a stale yt-dlp fails every download with "Requested
        # format is not available". latest yt-dlp keeps up with those changes.
        run: |
          pip install -r requirements.txt pynacl
          pip install --upgrade yt-dlp

      - name: refresh instagram token
        env:
          INSTAGRAM_ACCOUNT_TOKEN: ${{ secrets.INSTAGRAM_ACCOUNT_TOKEN }}
          GH_PAT:                  ${{ secrets.GH_PAT }}
        run: python scripts/refresh_ig_token.py

      - name: write youtube cookies
        # youtube bot-checks github's datacenter IPs; a cookie file from a
        # logged-in session (stored as a secret in netscape format) gets
        # yt-dlp/spotdl past it. no-op when the secret is unset, so the file
        # simply won't exist and spotify.py skips the --cookie-file flag.
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          if [ -n "$YOUTUBE_COOKIES" ]; then
            printf '%s' "$YOUTUBE_COOKIES" > "$RUNNER_TEMP/youtube-cookies.txt"
            echo "wrote cookie file"
          else
            echo "YOUTUBE_COOKIES secret is empty; running without cookies"
          fi

      - name: post song
        env:
          SPOTIFY_CLIENT_ID:     ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
          INSTAGRAM_ACCOUNT_TOKEN: ${{ secrets.INSTAGRAM_ACCOUNT_TOKEN }}
          INSTAGRAM_USER_ID:     ${{ secrets.INSTAGRAM_USER_ID }}
          GH_TOKEN:              ${{ github.token }}
          YOUTUBE_COOKIE_FILE:   ${{ runner.temp }}/youtube-cookies.txt
        run: python main.py -v
