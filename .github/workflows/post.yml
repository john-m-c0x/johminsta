name: post song reel

on:
  schedule:
    - cron: "17 15 * * *"
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libcairo2 libpango-1.0-0

      - name: install python dependencies
        run: pip install -r requirements.txt

      - name: reconstruct spotify token cache
        run: |
          cat > .spotify_cache <<JSON
          {
            "access_token": "",
            "token_type": "Bearer",
            "expires_in": 3600,
            "refresh_token": "${{ secrets.SPOTIFY_REFRESH_TOKEN }}",
            "scope": "user-library-read",
            "expires_at": 0
          }
          JSON

      - name: reconstruct instagram session
        run: echo "${{ secrets.INSTAGRAM_SESSION_B64 }}" | base64 -d > .instagrapi_session.json

      - name: run
        env:
          SPOTIFY_CLIENT_ID:     ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          INSTAGRAM_USERNAME:    ${{ secrets.INSTAGRAM_USERNAME }}
          INSTAGRAM_PASSWORD:    ${{ secrets.INSTAGRAM_PASSWORD }}
        run: python main.py -v
